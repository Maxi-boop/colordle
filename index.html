<!doctype html>
<html>
  <head>
    <title>Colordle</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="total-client-area">
      <div id="text-area">
        <h2 id="guessed-difference">Guess a color...</h2>
      </div>
      <div id="client-guess-area">
        <div id="client-area">
          <div id="chosen-color"></div>

          <div id="color-form-sliders">
            <input
              type="range"
              id="first-item"
              name="first-item"
              min="0"
              max="360"
            />

            <input
              type="range"
              id="second-item"
              name="second-item"
              min="0"
              max="100"
            />

            <input
              type="range"
              id="third-item"
              name="third-item"
              min="0"
              max="100"
            />
          </div>
        </div>
        <div id="guesses">
          <div id="canvas-guesses-area"></div>
        </div>
      </div>

      <div class="button-container">
        <button id="submit-color-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-question-square"
            viewBox="0 0 16 16"
          >
            <path
              d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"
            />
            <path
              d="M5.255 5.786a.237.237 0 0 0 .241.247h.825c.138 0 .248-.113.266-.25.09-.656.54-1.134 1.342-1.134.686 0 1.314.343 1.314 1.168 0 .635-.374.927-.965 1.371-.673.489-1.206 1.06-1.168 1.987l.003.217a.25.25 0 0 0 .25.246h.811a.25.25 0 0 0 .25-.25v-.105c0-.718.273-.927 1.01-1.486.609-.463 1.244-.977 1.244-2.056 0-1.511-1.276-2.241-2.673-2.241-1.267 0-2.655.59-2.75 2.286m1.557 5.763c0 .533.425.927 1.01.927.609 0 1.028-.394 1.028-.927 0-.552-.42-.94-1.029-.94-.584 0-1.009.388-1.009.94"
            />
          </svg>
          <span>Guess</span>
        </button>
        <button id="randomize-button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            fill="currentColor"
            class="bi bi-dice-2"
            viewBox="0 0 16 16"
          >
            <path
              d="M13 1a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2zM3 0a3 3 0 0 0-3 3v10a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3V3a3 3 0 0 0-3-3z"
            />
            <path
              d="M5.5 4a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m8 8a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"
            />
          </svg>

          <span>Randomize</span>
        </button>
      </div>
    </div>

    <script>
      //set up game
      const chosenColorArea = document.getElementById("chosen-color");
      let randHue = Math.floor(Math.random() * 360);
      let randSat = Math.floor(Math.random() * 100);
      let randLig = Math.floor(Math.random() * 100);
      chosenColorArea.style.backgroundColor = `hsl(${randHue}, ${randSat}%, ${randLig}%)`;

      const area = document.getElementById("client-area");
      //set the inital color
      area.style.backgroundColor = "hsl(0,0%,0%)";

      const sliderOne = document.getElementById("first-item");
      const sliderTwo = document.getElementById("second-item");
      const sliderThree = document.getElementById("third-item");

      const labelOne = document.getElementById("first-item-label");
      const labelTwo = document.getElementById("second-item-label");
      const labelThree = document.getElementById("third-item-label");

      //labelOne.innerText = "0";
      //labelTwo.innerText = "0%";
      //labelThree.innerText = "0%";

      let hue = 0;
      let saturation = 0;
      let lightness = 0;

      sliderOne.style.background = `linear-gradient(to bottom, hsl(0,${saturation}%,${lightness}%), hsl(120,${saturation}%,${lightness}%), hsl(240,${saturation}%,${saturation}%), hsl(360,${saturation}%,${lightness}%))`;
      sliderTwo.style.background = `linear-gradient(to bottom, hsl(${hue}, 0%, ${lightness}%), hsl(${hue}, 100%, ${saturation}%))`;
      sliderThree.style.background = `linear-gradient(to bottom, hsl(${hue}, ${saturation}%, 0%), hsl(${hue}, ${saturation}%, 100%))`;

      sliderOne.value = 0;
      sliderTwo.value = 0;
      sliderThree.value = 0;

      function changeCanvasColor() {
        area.style.backgroundColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        sliderOne.style.background = `linear-gradient(to bottom, hsl(0,${saturation}%,${lightness}%), hsl(120,${saturation}%,${lightness}%), hsl(240,${saturation}%,${saturation}%), hsl(360,${saturation}%,${lightness}%))`;
        sliderTwo.style.background = `linear-gradient(to bottom, hsl(${hue}, 0%, ${lightness}%), hsl(${hue}, 100%, ${saturation}%))`;
        sliderThree.style.background = `linear-gradient(to bottom, hsl(${hue}, ${saturation}%, 0%), hsl(${hue}, ${saturation}%, 100%))`;
      }

      sliderOne.addEventListener("input", () => {
        hue = sliderOne.value;
        //labelOne.innerText = hue;

        changeCanvasColor();
      });
      sliderTwo.addEventListener("input", () => {
        saturation = sliderTwo.value;
        //labelTwo.innerText = `${saturation}%`;
        changeCanvasColor();
      });
      sliderThree.addEventListener("input", () => {
        lightness = sliderThree.value;
        //labelThree.innerText = `${lightness}%`;
        changeCanvasColor();
      });

      const guessButton = document.getElementById("submit-color-button");

      function calculateColorDiff() {
        observedDifferenceHue = Math.abs((hue - randHue) / 360);
        observedDifferenceSat = Math.abs((saturation - randSat) / 100);
        observedDifferenceLig = Math.abs((lightness - randLig) / 100);

        const initalVal = 0;
        const totalDifference = [
          observedDifferenceHue,
          observedDifferenceLig,
          observedDifferenceSat,
        ].reduce((acc, curr) => acc + curr, initalVal);

        const maxHue = Math.max(360 - randHue, randHue) / 360;
        const maxSat = Math.max(100 - randSat, randSat) / 100;
        const maxLig = Math.max(100 - randLig, randLig) / 100;
        const totalMax = maxHue + maxSat + maxLig;

        return (totalDifference / totalMax) * 100;
      }

      //have handler for submit and adding to guesses area
      const guessesArea = document.getElementById("canvas-guesses-area");
      const guessedDifference = document.getElementById("guessed-difference");
      guessButton.addEventListener("click", (e) => {
        e.preventDefault();

        const diff = Math.floor(calculateColorDiff());
        let guessedText;

        if (diff > 60) guessedText = "You are wayyy off";
        else if (diff > 40) guessedText = "You're getting there (I think)";
        else if (diff > 10) guessedText = "Keep trying...";
        else if (diff > 1) guessedText = "You're so close.";
        else if (diff > 0) guessedText = "Tiny increments.";
        else if (diff == 0) guessedText = "You got it.";

        guessedDifference.innerText =
          "Your guess is off by " + diff + "%. " + guessedText;

        const newCanvas = document.createElement("canvas");
        newCanvas.width = 50;
        newCanvas.height = 50;

        newCanvas.style.backgroundColor = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
        guessesArea.prepend(newCanvas);
      });

      const randomizeButton = document.getElementById("randomize-button");
      randomizeButton.addEventListener("click", () => {
        randHue = Math.floor(Math.random() * 360);
        randSat = Math.floor(Math.random() * 100);
        randLig = Math.floor(Math.random() * 100);

        chosenColorArea.style.backgroundColor = `hsl(${randHue}, ${randSat}%, ${randLig}%)`;
        area.style.backgroundColor = "hsl(0,0%,0%)";

        hue = 0;
        saturation = 0;
        lightness = 0;

        sliderOne.value = 0;
        sliderTwo.value = 0;
        sliderThree.value = 0;

        guessesArea.innerHTML = "";
        changeCanvasColor();
      });
    </script>
  </body>
</html>
